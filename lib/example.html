<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 1 – Download Icon Layout</title>
</head>
<body>

  <a
    class="doc-download-card"
    href="YOUR_PDF_FILE.pdf"
    download="MGM_Campaign_Terms_Conditions.pdf"
    aria-label="Download Member-Get-Member Campaign Terms and Conditions PDF"
    tabindex="0"
    style="display:inline-flex;align-items:center;gap:16px;background:#ffffff;border:1px solid #e8e8e8;border-radius:8px;padding:20px 24px;text-decoration:none;color:inherit;max-width:420px;width:100%;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.08);transition:box-shadow 0.22s cubic-bezier(0.4,0,0.2,1),border-color 0.22s cubic-bezier(0.4,0,0.2,1),background 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.22s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden;outline-offset:3px;"
  >

    <!-- ── Document icon ── -->
    <span
      class="doc-download-card__icon-wrap"
      aria-hidden="true"
      style="flex-shrink:0;width:52px;height:52px;background:#fdf0f2;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.22s cubic-bezier(0.4,0,0.2,1);"
    >
      <svg
        viewBox="0 0 24 24" fill="none" stroke="#c8102e"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        xmlns="http://www.w3.org/2000/svg"
        style="width:28px;height:28px;transition:transform 0.22s cubic-bezier(0.4,0,0.2,1);"
      >
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="13" y2="17"/>
        <polyline points="10 20 12 22 14 20"/>
        <line x1="12" y1="17" x2="12" y2="22"/>
      </svg>
    </span>

    <!-- ── Text body ── -->
    <span
      style="display:flex;flex-direction:column;gap:4px;"
    >
      <span style="font-size:15px;font-weight:700;line-height:1.35;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        Member-Get-Member Campaign<br>Terms &amp; Conditions
      </span>
      <span
        class="doc-download-card__meta"
        aria-hidden="true"
        style="font-size:12.5px;color:#c8102e;font-weight:500;letter-spacing:0.01em;display:flex;align-items:center;gap:4px;opacity:0;transform:translateX(-4px);transition:opacity 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.22s cubic-bezier(0.4,0,0.2,1);"
      >
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#c8102e" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H8L2 8v14a2 2 0 002 2h16a2 2 0 002-2V4a2 2 0 00-2-2z"/>
        </svg>
        PDF · Download
      </span>
    </span>

    <!-- ── Download chevron ── -->
    <span
      class="doc-download-card__arrow"
      aria-hidden="true"
      style="margin-left:auto;flex-shrink:0;color:#c8102e;opacity:0.4;transition:opacity 0.22s cubic-bezier(0.4,0,0.2,1),transform 0.22s cubic-bezier(0.4,0,0.2,1);"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="#c8102e" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round"
           xmlns="http://www.w3.org/2000/svg">
        <line x1="12" y1="4" x2="12" y2="16"/>
        <polyline points="8 12 12 16 16 12"/>
      </svg>
    </span>

  </a>

  <script>
    document.querySelectorAll('.doc-download-card').forEach(function (card) {
      var iconWrap = card.querySelector('.doc-download-card__icon-wrap');
      var iconSvg  = iconWrap.querySelector('svg');
      var meta     = card.querySelector('.doc-download-card__meta');
      var arrow    = card.querySelector('.doc-download-card__arrow');

      card.addEventListener('mouseenter', function () {
        card.style.boxShadow    = '0 6px 24px rgba(200,16,46,0.14)';
        card.style.borderColor  = 'rgba(200,16,46,0.25)';
        card.style.background   = '#fdf0f2';
        card.style.transform    = 'translateY(-2px)';
        iconWrap.style.background = 'rgba(200,16,46,0.12)';
        iconWrap.style.transform  = 'scale(1.06)';
        iconSvg.style.transform   = 'translateY(2px)';
        meta.style.opacity        = '1';
        meta.style.transform      = 'translateX(0)';
        arrow.style.opacity       = '1';
        arrow.style.transform     = 'translateY(3px)';
      });

      card.addEventListener('mouseleave', function () {
        card.style.boxShadow    = '0 2px 12px rgba(0,0,0,0.08)';
        card.style.borderColor  = '#e8e8e8';
        card.style.background   = '#ffffff';
        card.style.transform    = 'translateY(0)';
        iconWrap.style.background = '#fdf0f2';
        iconWrap.style.transform  = 'scale(1)';
        iconSvg.style.transform   = 'translateY(0)';
        meta.style.opacity        = '0';
        meta.style.transform      = 'translateX(-4px)';
        arrow.style.opacity       = '0.4';
        arrow.style.transform     = 'translateY(0)';
      });

      card.addEventListener('mousedown', function () {
        card.style.transform  = 'translateY(0)';
        card.style.boxShadow  = '0 2px 12px rgba(0,0,0,0.08)';
      });

      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
      });
    });
  </script>

</body>
</html>
