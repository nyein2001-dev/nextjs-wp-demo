    String currentUri = cms.getRequestContext().getUri();

    boolean redirectToMain =
        "/en".equals(currentUri)
        || "/en/".equals(currentUri)
        || (currentUri != null && currentUri.startsWith("/en/policyservices"));

    if (redirectToMain) {
        response.sendRedirect("/en/main");
        return;
    }
