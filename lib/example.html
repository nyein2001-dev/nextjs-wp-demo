
        <!-- The form itself — starts as Salesforce Web-to-Lead -->
        <form
            id="leadForm"
            action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DWJ000005CytZ"
            method="POST"
            data-mode="salesforce">


            
            <!-- Submit button wrapper — toggled by JS -->
            <div id="submitWrapper">
                <!-- Default: Salesforce submit button -->
                <input id="submitSalesforce" type="submit" name="submit">

                <!-- CMS submit button (hidden by default) -->
                <button
                    id="submitCMS"
                    form="leadForm"
                    class="cta-primary submit-form"
                    type="submit"
                    style="display:none;">
                    <span>${content.value.GeneralForm.value.SubmitButtonText}</span>
                </button>
            </div>



            
    <script>
        // ─── Element references ────────────────────────────────────────────────────
        var form            = document.getElementById('leadForm');
        var isCustomerYes   = document.getElementById('isCustomerYes');
        var isCustomerNo    = document.getElementById('isCustomerNo');
        var enquiryField    = document.getElementById('enquiryField');
        var enquirySelect   = document.getElementById('enquiry');
        var submitSalesforce = document.getElementById('submitSalesforce');
        var submitCMS        = document.getElementById('submitCMS');

        // ─── Form mode configurations ──────────────────────────────────────────────
        var SALESFORCE_CONFIG = {
            action      : 'https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DWJ000005CytZ',
            method      : 'POST',
            // custom data-* attributes to REMOVE when in Salesforce mode
            removeAttrs : ['data-submit-form', 'data-url-submit', 'data-analytics', 'data-url-redirect', 'data-method']
        };

        var CMS_CONFIG = {
            // data-* attributes to SET when in CMS mode
            'data-submit-form' : '',                                          // presence-only flag
            'data-url-submit'  : '<cms:link>../action/contact-form.jsp</cms:link>',
            'data-analytics'   : '{"event":"formStarts","formName":"Contact us form mm","formType":"Contact us form mm"}',
            'data-url-redirect': '<cms:link> ${content.value.GeneralForm.value.SuccessPageLink} </cms:link>',
            'data-method'      : 'POST'
        };

        // ─── Core switching function ───────────────────────────────────────────────
        function switchFormMode(mode) {
            if (mode === 'cms') {
                // 1. Remove the Salesforce action so the CMS handler takes over
                form.removeAttribute('action');

                // 2. Apply all CMS data-* attributes
                Object.keys(CMS_CONFIG).forEach(function(attr) {
                    form.setAttribute(attr, CMS_CONFIG[attr]);
                });

                // 3. Toggle submit buttons
                submitSalesforce.style.display = 'none';
                submitCMS.style.display        = '';

            } else {
                // 1. Restore Salesforce action
                form.setAttribute('action', SALESFORCE_CONFIG.action);
                form.setAttribute('method', SALESFORCE_CONFIG.method);

                // 2. Remove all CMS data-* attributes
                SALESFORCE_CONFIG.removeAttrs.forEach(function(attr) {
                    form.removeAttribute(attr);
                });

                // 3. Toggle submit buttons
                submitSalesforce.style.display = '';
                submitCMS.style.display        = 'none';
            }
        }

        // ─── Enquiry select listener ───────────────────────────────────────────────
        enquirySelect.addEventListener('change', function() {
            if (this.value === 'Claims related / others') {
                switchFormMode('cms');
            } else {
                switchFormMode('salesforce');
            }
        });

        // ─── Existing customer radio logic ────────────────────────────────────────
        function updateConditionalFields() {
            if (isCustomerYes.checked) {
                enquiryField.style.display = 'block';
                enquirySelect.required     = true;
                document.getElementById('location').required = false;
            } else if (isCustomerNo.checked) {
                enquiryField.style.display = 'none';
                enquirySelect.required     = false;
                document.getElementById('location').required = true;

                // Reset enquiry & revert form to Salesforce mode when hidden
                enquirySelect.value = '';
                switchFormMode('salesforce');
            } else {
                enquiryField.style.display = 'none';
                switchFormMode('salesforce');
            }
        }
