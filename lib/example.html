<script>
  document.addEventListener('DOMContentLoaded', function () {
    var form          = document.getElementById('form');
    var enquirySelect = document.getElementById('enquiry');
    var isCustomerYesEl = document.getElementById('isCustomerYes');
    var isCustomerNoEl  = document.getElementById('isCustomerNo');

    var SF_ACTION = 'https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DHr0000077xXi';
    var CF_ACTION = '<cms:link>../action/contact-form.jsp</cms:link>';

    /* ------------------------------------------------------------------ */
    /* setContactForm                                                       */
    /* Sets the form to POST to contact-form.jsp via the pbtb data-*       */
    /* attributes AND via native action/method so no fallback to GET.      */
    /* novalidate is mandatory here: Parsley owns validation in this path. */
    /* ------------------------------------------------------------------ */
    function setContactForm() {
      /* Native attributes — prevent any GET / current-page fallback */
      form.setAttribute('action',     CF_ACTION);
      form.setAttribute('method',     'POST');
      form.setAttribute('novalidate', '');

      /* pbtb framework attributes */
      form.setAttribute('data-submit-form', '');
      form.setAttribute('data-url-submit',  CF_ACTION);
      form.setAttribute('data-method',      'POST');
      form.setAttribute('data-analytics',   '{"event":"formStarts","formName":"Contact us form mm","formType":"Contact us mm"}');
      form.setAttribute('data-url-redirect','<cms:link>${content.value.GeneralForm.value.SuccessPageLink}</cms:link>');
    }

    /* ------------------------------------------------------------------ */
    /* setSalesforce                                                        */
    /* Tears down every contact-form attribute cleanly before switching.   */
    /* novalidate must be removed so Salesforce's native validation works. */
    /* ------------------------------------------------------------------ */
    function setSalesforce() {
      /* Remove all pbtb / contact-form attributes */
      form.removeAttribute('data-submit-form');
      form.removeAttribute('data-url-submit');
      form.removeAttribute('data-method');
      form.removeAttribute('data-analytics');
      form.removeAttribute('data-url-redirect');

      /* Remove novalidate — Salesforce path uses native HTML5 validation */
      form.removeAttribute('novalidate');

      /* Native attributes for direct Salesforce POST */
      form.setAttribute('action', SF_ACTION);
      form.setAttribute('method', 'POST');
    }

    /* ------------------------------------------------------------------ */
    /* updateFormTarget                                                     */
    /* Rule: Claims + policy-holder=Y  → contact-form.jsp                 */
    /*       Everything else           → Salesforce                        */
    /* ------------------------------------------------------------------ */
    function updateFormTarget() {
      var isNoPolicyHolder = isCustomerNoEl && isCustomerNoEl.checked;
      var selectedText     = '';

      if (enquirySelect && enquirySelect.selectedIndex >= 0) {
        selectedText = enquirySelect.options[enquirySelect.selectedIndex].text;
      }

      var isClaims = (selectedText === 'Claims related / others');

      if (isClaims && !isNoPolicyHolder) {
        setContactForm();
      } else {
        setSalesforce();
      }
    }

    /* ------------------------------------------------------------------ */
    /* Submit guard                                                         */
    /* Enforces POST and prevents query-string submission if the pbtb      */
    /* framework has not yet cancelled the native event itself.            */
    /* ------------------------------------------------------------------ */
    form.addEventListener('submit', function (e) {
      /* Only intervene when the form is in contact-form.jsp mode */
      if (form.hasAttribute('data-submit-form')) {
        /* Guarantee method is POST before the pbtb handler fires */
        form.method = 'POST';

        /* Belt-and-braces: if pbtb did NOT already preventDefault,
           do it ourselves and POST manually via XHR.               */
        if (!e.defaultPrevented) {
          e.preventDefault();

          var url      = form.getAttribute('data-url-submit') || CF_ACTION;
          var redirect = form.getAttribute('data-url-redirect') || '';
          var params   = [];
          var elements = form.elements;

          for (var i = 0; i < elements.length; i++) {
            var el = elements[i];
            if (!el.name || el.disabled) { continue; }
            if ((el.type === 'radio' || el.type === 'checkbox') && !el.checked) { continue; }
            params.push(encodeURIComponent(el.name) + '=' + encodeURIComponent(el.value));
          }

          var xhr = new XMLHttpRequest();
          xhr.open('POST', url, true);
          xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (redirect) {
                window.location.href = redirect;
              }
            }
          };
          xhr.send(params.join('&'));
        }
      }
    });

    /* ------------------------------------------------------------------ */
    /* Initialise and bind                                                  */
    /* ------------------------------------------------------------------ */
    setSalesforce(); /* default state on page load */

    if (enquirySelect) {
      enquirySelect.addEventListener('change', updateFormTarget);
    }
    if (isCustomerYesEl) {
      isCustomerYesEl.addEventListener('change', updateFormTarget);
    }
    if (isCustomerNoEl) {
      isCustomerNoEl.addEventListener('change', updateFormTarget);
    }
  });
</script>

<form id="form">

<script>
  /*
   * Dynamically assign form data attributes at page load.
   * ES5-only: no arrow functions, no const/let, no template literals.
   * <cms:link> and ${...} expressions below are resolved SERVER-SIDE by the
   * JSP engine before this script ever reaches the browser, so the rendered
   * output contains plain resolved strings — not tag markup.
   */
  document.addEventListener('DOMContentLoaded', function () {

    /* Locate the form by its stable id */
    var form = document.getElementById('form');

    /* Guard: exit silently if the form element is not present */
    if (!form) { return; }

    /*
     * data-submit-form
     * Boolean presence attribute — equivalent to the bare attribute in HTML.
     * setAttribute with an empty string preserves the original semantics.
     */
    form.setAttribute('data-submit-form', '');

    /*
     * data-url-submit
     * <cms:link> is resolved server-side to an absolute/relative URL string.
     * The rendered JS will contain the plain URL, e.g. "/sites/default/action/contact-form.jsp"
     */
    form.setAttribute('data-url-submit', '<cms:link>../action/contact-form.jsp</cms:link>');

    /*
     * data-analytics
     * The JSON value contains double-quote characters, so the surrounding JS
     * string uses single quotes to avoid any escaping conflict.
     * This mirrors the original single-quoted HTML attribute approach.
     */
    form.setAttribute('data-analytics', '{"event":"formStarts","formName":"Contact us form mm","formType":"Contact us mm"}');

    /*
     * data-url-redirect
     * <cms:link> wraps a JSP EL expression; both are evaluated server-side.
     * The EL resolves first (to a path string), then <cms:link> converts it
     * to a fully qualified CMS-managed URL before output reaches the browser.
     */
    form.setAttribute('data-url-redirect', '<cms:link>${content.value.GeneralForm.value.SuccessPageLink}</cms:link>');

    /*
     * data-method
     * Plain string — no server-side interpolation required.
     */
    form.setAttribute('data-method', 'POST');

  });
</script>
