<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGM T&C Download — Option A</title>
</head>
<body style="margin:0;padding:40px 24px;box-sizing:border-box;background:#f4f4f4;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif;">

  <!-- Preview card -->
  <div style="background:#fff;border-radius:12px;padding:32px 40px;box-shadow:0 2px 12px rgba(0,0,0,0.07);min-width:340px;">

    <!-- Label -->
    <p style="margin:0 0 8px;font-size:11px;font-weight:700;color:#555;letter-spacing:0.08em;text-transform:uppercase;">
      Option A &nbsp;·&nbsp; Download Link Style
    </p>

    <!-- Download link -->
    <a
      href="https://www.prubsn.com.my/export/sites/prudential-pbtb/en/.galleries/pdf/PruBSN_Protect-Prosper-Preserve_A5Flyer_ENG.pdf"
      download
      aria-label="Download Member-Get-Member Campaign Terms and Conditions"
      style="display:inline-flex;align-items:center;gap:10px;color:#8B0000;text-decoration:none;font-weight:700;font-size:15px;"
    >
      <!-- Icon wrapper -->
      <span style="display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg
          width="20" height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
          focusable="false"
          style="display:block;"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </span>

      Member-Get-Member Campaign Terms &amp; Conditions
    </a>

  </div>

</body>
</html>
